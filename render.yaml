services:
  - type: web
    name: rag-teaching-assistant
    runtime: python
    buildCommand: |
      echo "Python version:"
      python --version
      pip install --upgrade pip setuptools wheel
      pip install numpy==1.24.3
      pip install --no-cache-dir -r requirements.txt
    startCommand: gunicorn backend.app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: RENDER
        value: true
    plan: free